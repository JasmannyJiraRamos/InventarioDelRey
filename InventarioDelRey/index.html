<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Bazar Del Rey · Inventario y Ventas</title>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Dexie.js for simple IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.3/dist/dexie.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars-container"></div> <!-- stars background -->
    <div class="app">
        <!-- Header with logo -->
        <header>
            <div class="logo-area">
                <img id="storeLogo" src="Logo.PNG" alt="Logo Oso con Corona" class="logo-img">
                <div class="title">
                    <h1>El Bazar Del Rey</h1>
                    <p>Inventario</p>
                </div>
            </div>
            <div class="date-info" id="currentDate"></div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="inventory"><i class="fas fa-boxes"></i> Inventario</button>
            <button class="tab-btn" data-tab="sales"><i class="fas fa-cash-register"></i> Vender</button>
            <button class="tab-btn" data-tab="reports"><i class="fas fa-chart-line"></i> Reportes</button>
        </nav>

        <!-- ========== INVENTORY SECTION ========== -->
        <div id="inventoryTab" class="tab-content active">
            <div class="section-header">
                <h2><i class="fas fa-toy"></i> Mis Productos</h2>
                <button id="showAddToyBtn" class="btn-primary"><i class="fas fa-plus-circle"></i> Nuevo juguete</button>
            </div>
            <!-- Add / Edit Form (hidden by default) -->
            <div id="toyFormContainer" class="form-card hidden">
                <h3 id="formTitle">Agregar juguete</h3>
                <form id="toyForm">
                    <input type="hidden" id="toyId">
                    <div class="form-row">
                        <div class="input-group">
                            <label><i class="fas fa-tag"></i> Nombre *</label>
                            <input type="text" id="toyName" required placeholder="Ej. Oso Peluche">
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-list"></i> Categoría</label>
                            <input type="text" id="toyCategory" placeholder="Peluche, educativo, etc.">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label><i class="fas fa-chart-line"></i> Costo ($)</label>
                            <input type="number" id="toyCost" step="0.01" placeholder="0.00">
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-dollar-sign"></i> Precio venta ($)</label>
                            <input type="number" id="toyPrice" step="0.01" required placeholder="0.00">
                        </div>
                        
                        <div class="input-group">
                            <label><i class="fas fa-cubes"></i> Stock inicial</label>
                            <input type="number" id="toyStock" value="0" min="0">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-group full-width">
                            <label><i class="fas fa-camera"></i> Imagen (foto o archivo)</label>
                            <input type="file" id="toyImage" accept="image/*" capture="environment">
                            <div id="imagePreview" class="image-preview"></div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Guardar</button>
                        <button type="button" id="cancelFormBtn" class="btn-secondary"><i class="fas fa-times"></i> Cancelar</button>
                    </div>
                </form>
            </div>

            <!-- Inventory grid -->
            <div id="inventoryGrid" class="inventory-grid">
                <!-- Cards will be injected -->
                <div class="loading">Cargando productos...</div>
            </div>
        </div>

        <!-- ========== SALES SECTION ========== -->
        <div id="salesTab" class="tab-content">
            <div class="section-header">
                <h2><i class="fas fa-cart-shopping"></i> Registrar venta</h2>
            </div>
            <div class="sales-panel">
                <div class="select-product-area">
                    <label><i class="fas fa-search"></i> Seleccionar juguete</label>
                    <select id="productSelect" class="product-select">
                        <option value="">-- Elige un producto --</option>
                    </select>
                    <div id="selectedProductInfo" class="product-info-card"></div>
                </div>
                <div class="sale-form">
                    <div class="input-group">
                        <label><i class="fas fa-hashtag"></i> Cantidad</label>
                        <input type="number" id="saleQuantity" value="1" min="1" step="1">
                    </div>
                    <div class="total-price">
                        <span>Total:</span>
                        <span id="saleTotal">$0.00</span>
                    </div>
                    <button id="recordSaleBtn" class="btn-primary btn-large"><i class="fas fa-check-circle"></i> Registrar venta</button>
                </div>
            </div>
            <hr>
            <div class="recent-sales">
                <h3><i class="fas fa-clock"></i> Últimas ventas</h3>
                <div id="recentSalesList" class="sales-list"></div>
            </div>
        </div>

        <!-- ========== REPORTS SECTION ========== -->
        <div id="reportsTab" class="tab-content">
            <div class="section-header">
                <h2><i class="fas fa-chart-simple"></i> Ingresos y ganancias</h2>
                <div class="report-filters">
                    <button class="filter-btn active" data-period="day"><i class="fas fa-sun"></i> Hoy</button>
                    <button class="filter-btn" data-period="week"><i class="fas fa-calendar-week"></i> Esta semana</button>
                    <button class="filter-btn" data-period="month"><i class="fas fa-calendar-alt"></i> Este mes</button>
                </div>
            </div>
            <div class="stats-cards">
                <div class="stat-card">
                    <i class="fas fa-dollar-sign"></i>
                    <h3>Ingresos</h3>
                    <p id="totalIncome">$0</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-chart-line"></i>
                    <h3>Ganancia neta</h3>
                    <p id="totalProfit">$0</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-receipt"></i>
                    <h3>Ventas realizadas</h3>
                    <p id="salesCount">0</p>
                </div>
            </div>
            <div class="sales-detail">
                <h3><i class="fas fa-list-ul"></i> Detalle de ventas del período</h3>
                <div id="periodSalesList" class="sales-list"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
